name = "secunit-io"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
# @astrojs/node writes prerendered HTML to dist/client/, not dist/
pages_build_output_dir = "dist/client"

# D1 Database binding for contact form submissions
[[d1_databases]]
binding = "DB"
database_name = "secunit-contacts"
database_id = "4b4a4589-119f-4a2b-aff7-0de7402ade8d"

[vars]
NODE_VERSION = "26"
BUN_VERSION = "1.3"
CONTACT_EMAIL = "whyhellothere@secunit.io"
