# Self-hosted runner on the production VPS: build and copy into place (no SSH/rsync from GitHub).
# `runs-on` matches labels (self-hosted, Linux, X64), not the runner display name (e.g. hetzner).

name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/secunit.io/web
  RESTART_SCRIPT: /opt/secunit.io/bin/restart.sh

jobs:
  deploy:
    name: Deploy (self-hosted)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v4
        with:
          node-version: "26"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          ASTRO_SITE_URL: https://secunit.io

      # Standalone server still resolves some packages from node_modules at runtime (e.g. piccolore).
      # Exclude manifests + node_modules from rsync --delete so bun install output is not wiped.
      # Assumes /opt/secunit.io (secunit home) and children web/ + bin/ already exist and are writable.
      - name: Publish dist, production deps, and restart script
        run: |
          rsync -a --delete \
            --exclude node_modules \
            --exclude package.json \
            --exclude bun.lock \
            ./dist/ "${DEPLOY_PATH}/"
          cp package.json bun.lock "${DEPLOY_PATH}/"
          (cd "${DEPLOY_PATH}" && bun install --production --frozen-lockfile)
          cp scripts/restart.sh "${RESTART_SCRIPT}"
          chmod +x "${RESTART_SCRIPT}"

      - name: Restart application
        run: "${RESTART_SCRIPT}"
