# GitHub-hosted runner: build the Astro site and deploy to Cloudflare Pages with Wrangler.
# Production is the Cloudflare Pages project "secunit-io" (see wrangler.toml / setup-cloudflare-pages.sh).
# Requires repo secrets: CLOUDFLARE_API_TOKEN (Pages:Edit) and CLOUDFLARE_ACCOUNT_ID.

name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v4
        with:
          node-version: "26"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          ASTRO_SITE_URL: https://secunit.io

      # @astrojs/node writes the prerendered static output to dist/client/ (see wrangler.toml
      # pages_build_output_dir). Direct-upload that directory to the Pages project.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/client --project-name=secunit-io --branch=main
