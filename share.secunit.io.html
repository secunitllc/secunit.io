        :root {
            --color-primary: #c800df;
            --color-secondary: #e60076;
            --color-paper: #0c0c10;
            --color-surface: #16161c;
            --color-ink: #f9fafb;
            --color-muted: #9ca3af;
            --color-rule: #27272f;
            --color-accent-text: #e879f9;
            --color-focus: #e879f9;
            --color-accent-ink: #ffffff;
            --gradient-brand: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            --gradient-mesh:
                radial-gradient(ellipse 70% 55% at 8% -8%, color-mix(in srgb, var(--color-primary) 22%, transparent), transparent 55%),
                radial-gradient(ellipse 55% 45% at 92% 2%, color-mix(in srgb, var(--color-secondary) 18%, transparent), transparent 50%);
            --font-body: "Jost", ui-sans-serif, system-ui, sans-serif;
            --font-outlier: "Overpass Mono", ui-monospace, "SFMono-Regular", monospace;
            --radius-card: 1.25rem;
            --radius-pill: 999px;
            --shadow-bento: 0 1px 2px color-mix(in srgb, #000 30%, transparent),
                0 12px 32px color-mix(in srgb, #000 35%, transparent);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --dur-short: 220ms;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            color-scheme: dark;
        }

        body {
            font-family: var(--font-body);
            min-height: 100vh;
            background-color: var(--color-paper);
            background-image: var(--gradient-mesh);
            background-attachment: fixed;
            color: var(--color-ink);
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--color-rule);
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .filename {
            font-family: var(--font-outlier);
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--color-accent-text);
            background: color-mix(in srgb, var(--color-primary) 12%, transparent);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid color-mix(in srgb, var(--color-primary) 35%, transparent);
            word-break: break-all;
            letter-spacing: 0.02em;
        }

        .meta {
            display: flex;
            gap: 1.5rem;
            font-size: 0.875rem;
            color: var(--color-muted);
        }

        .meta span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-outlier);
        }

        .meta svg {
            width: 16px;
            height: 16px;
            stroke: var(--color-muted);
            stroke-width: 2;
            fill: none;
        }

        .preview-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-surface);
            border-radius: var(--radius-card);
            border: 1px solid var(--color-rule);
            box-shadow: var(--shadow-bento);
            min-height: 300px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .preview-section img,
        .preview-section video {
            max-width: 100%;
            max-height: 65vh;
            border-radius: 0.5rem;
        }

        .preview-section iframe {
            width: 100%;
            height: 60vh;
            border: none;
            border-radius: 0.5rem;
            background: #fff;
        }

        .file-placeholder {
            text-align: center;
            color: var(--color-muted);
        }

        .file-placeholder svg {
            width: 64px;
            height: 64px;
            stroke: var(--color-muted);
            stroke-width: 1;
            fill: none;
            margin-bottom: 1rem;
        }

        .file-placeholder p {
            font-family: var(--font-outlier);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .file-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .site-footer {
            margin-top: 2rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--color-rule);
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr) auto;
            align-items: center;
            column-gap: 1.5rem;
            font-size: 0.75rem;
            line-height: 1.35;
            color: var(--color-muted);
        }

        .site-footer__item {
            min-width: 0;
        }

        .site-footer__item--brand {
            font-weight: 500;
        }

        .site-footer__item--tagline {
            text-align: center;
            white-space: nowrap;
        }

        .site-footer__item--host {
            text-align: right;
        }

        .site-footer a {
            color: var(--color-accent-text);
            text-decoration: none;
            transition: color var(--dur-short) var(--ease-out);
        }

        .site-footer a:hover {
            color: var(--color-primary);
        }

        .site-footer a:focus-visible {
            outline: 3px solid var(--color-focus);
            outline-offset: 2px;
        }

        .site-footer__host {
            font-family: var(--font-outlier);
            font-size: 0.6875rem; /* mono reads larger optically than Jost */
            letter-spacing: 0.02em;
        }

        .site-footer__social {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .site-footer__social a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border-radius: var(--radius-pill);
            border: 1px solid var(--color-rule);
            color: var(--color-muted);
            transition: color var(--dur-short) var(--ease-out),
                border-color var(--dur-short) var(--ease-out),
                background-color var(--dur-short) var(--ease-out);
        }

        .site-footer__social a:hover {
            color: var(--color-accent-text);
            border-color: color-mix(in srgb, var(--color-primary) 35%, transparent);
            background: color-mix(in srgb, var(--color-primary) 8%, transparent);
        }

        .site-footer__social a:focus-visible {
            outline: 3px solid var(--color-focus);
            outline-offset: 2px;
        }

        .site-footer__social svg {
            width: 1rem;
            height: 1rem;
            fill: currentColor;
        }

        .file-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .file-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--color-ink);
        }

        .file-size {
            font-family: var(--font-outlier);
            font-size: 0.875rem;
            color: var(--color-muted);
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            min-height: 44px;
            background: var(--gradient-brand);
            color: var(--color-accent-ink);
            padding: 1rem 2rem;
            border-radius: var(--radius-pill);
            border: 1px solid color-mix(in srgb, var(--color-primary) 40%, transparent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9375rem;
            transition: transform var(--dur-short) var(--ease-out),
                box-shadow var(--dur-short) var(--ease-out),
                border-color var(--dur-short) var(--ease-out);
        }

        .download-btn:hover {
            transform: translateY(-1px);
            border-color: var(--color-primary);
            box-shadow: 0 4px 20px color-mix(in srgb, var(--color-primary) 35%, transparent);
        }

        .download-btn:focus-visible {
            outline: 3px solid var(--color-focus);
            outline-offset: 4px;
        }

        .download-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        @media (prefers-reduced-motion: reduce) {
            .download-btn {
                transition-duration: 150ms;
            }

            .download-btn:hover {
                transform: none;
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 1.25rem;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .filename {
                font-size: 0.75rem;
                width: 100%;
            }

            .meta {
                width: 100%;
                justify-content: space-between;
            }

            .preview-section {
                min-height: 200px;
                padding: 1rem;
            }

            .file-footer {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }

            .site-footer {
                grid-template-columns: 1fr;
                justify-items: center;
                row-gap: 0.65rem;
                text-align: center;
            }

            .site-footer__item--tagline,
            .site-footer__item--host {
                text-align: center;
                white-space: normal;
            }

            .file-info {
                align-items: center;
            }

            .file-title {
                font-size: 1.25rem;
            }

            .download-btn {
                justify-content: center;
            }
        }
    </style>
