<!doctype html>
<!-- Source for /images/og-image.png (1200x630).
     Regenerate: open in a browser at exactly 1200x630 and screenshot. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@500;650;750&family=Geist+Mono:wght@650&display=swap" rel="stylesheet" />
<style>
  :root {
    --color-paper: oklch(16% 0.012 52);
    --color-paper-2: oklch(20% 0.014 52);
    --color-ink: oklch(94% 0.008 58);
    --color-ink-2: oklch(78% 0.01 58);
    --color-muted: oklch(69% 0.012 58);
    --color-rule: oklch(34% 0.012 52);
    --color-accent: oklch(72% 0.18 42);
    --font-display: "Geist", ui-sans-serif, system-ui, sans-serif;
    --font-outlier: "Geist Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background:
      linear-gradient(to right, oklch(34% 0.012 52 / 0.4) 1px, transparent 1px),
      linear-gradient(to bottom, oklch(34% 0.012 52 / 0.4) 1px, transparent 1px),
      var(--color-paper);
    background-size: 72px 72px;
    color: var(--color-ink);
    font-family: var(--font-display);
    padding: 64px 72px;
  }
  .kicker {
    color: var(--color-muted);
    font-family: var(--font-outlier);
    font-size: 22px;
    font-weight: 650;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  h1 {
    max-width: 18ch;
    font-size: 88px;
    font-weight: 750;
    letter-spacing: -0.055em;
    line-height: 0.98;
  }
  h1 em {
    color: var(--color-accent);
    font-style: normal;
  }
  .foot {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-top: 1px solid var(--color-rule);
    padding-top: 28px;
  }
  .wordmark {
    font-family: var(--font-outlier);
    font-size: 26px;
    font-weight: 650;
    letter-spacing: -0.03em;
  }
  .wordmark em {
    color: var(--color-accent);
    font-style: normal;
  }
  .domain {
    color: var(--color-ink-2);
    font-family: var(--font-outlier);
    font-size: 22px;
    font-weight: 650;
  }
</style>
</head>
<body>
  <p class="kicker">Security, DevOps &amp; AI Consulting</p>
  <h1>Enterprise-grade expertise. <em>Small business pricing.</em></h1>
  <div class="foot">
    <p class="wordmark"><em>Secunit</em> Mercantile</p>
    <p class="domain">secunit.io</p>
  </div>
</body>
</html>
