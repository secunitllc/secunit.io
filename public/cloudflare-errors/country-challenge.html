<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Verify your request | secunit, llc</title>
    <link rel="stylesheet" href="./error.css" />
  </head>
  <body>
    <main class="shell">
      <a class="brand" href="https://secunit.io" aria-label="secunit, llc home"
        ><span>secunit</span>, llc</a
      >

      <div class="error-layout">
        <section class="error-copy" aria-labelledby="error-title">
          <p class="eyebrow">[ Edge verification / 403 ]</p>
          <h1 id="error-title">One more step</h1>
          <p class="lede">
            Complete the verification check to continue. This helps us protect the site from
            automated abuse.
          </p>
        </section>

        <aside class="panel" aria-label="Verification">
          <p class="panel__label">Security check</p>
          <div class="cf-token">::CAPTCHA_BOX::</div>
          <dl class="meta">
            <dt>Ray ID</dt>
            <dd><code>::RAY_ID::</code></dd>
            <dt>Region</dt>
            <dd><code>::GEO::</code></dd>
          </dl>
        </aside>
      </div>

      <footer class="footer">
        <span>Security, DevOps, SRE, and AI consulting.</span>
        <a href="mailto:security@secunit.io">Need help?</a>
      </footer>
    </main>
  </body>
</html>
